<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>智算矩陣™ | AI Strategic Destiny Matrix</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(180deg,#0b1220,#111827);
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.hero{
padding:80px 20px;
text-align:center;
}

.logo{
font-size:42px;
font-weight:bold;
color:#fbbf24;
text-shadow:0 0 20px rgba(251,191,36,.6);
}

.subtitle{

font-size:20px;

}

.slogan{

font-size:18px;
line-height:1.8;
color:#f8fafc;
}

.cta{
margin-top:40px;
}

.cta button{
background:#fbbf24;
color:#111827;
border:none;
padding:15px 35px;
font-size:18px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
}

.section{
padding:30px 15px;
}

.section-title{
text-align:center;
font-size:28px;
color:#fbbf24;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
border:1px solid #334155;
}

.card h3{
margin-bottom:10px;
color:#fbbf24;
}

.card p{
font-size:14px;
color:#cbd5e1;
}

.footer{

</div>

</section>

<div class="grid">
