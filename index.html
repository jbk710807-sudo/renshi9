<!DOCTYPE html>

<head>

        body { background: var(--bg); color: var(--text); padding: 16px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--gold); color: var(--gold); font-size: 22px; font-weight: bold; letter-spacing: 1px; }
        .section-title { font-size: 16px; color: var(--gold); margin: 24px 0 12px 0; font-weight: bold; border-left: 4px solid var(--gold); padding-left: 8px; }
        .card { background: linear-gradient(135deg, #0e1726, #040810); border: 1px solid #1f2c42; border-radius: 14px; padding: 18px; margin: 12px 0; font-size: 14px; line-height: 1.7; }
        .row { display: flex; gap: 10px; margin-bottom: 12px; }
        .col { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: bold; }
        select, input { width: 100%; background: #101726; border: 1px solid var(--gold); color: #ffffff; padding: 10px; border-radius: 6px; font-size: 14px; }
        .btn { background: var(--gold); color: #000; font-weight: bold; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #e0b843; }
        .bazi-table { width: 100%; border-collapse: collapse; margin: 15px 0; text-align: center; }
        .bazi-table th, .bazi-table td { border: 1px solid #1f2c42; padding: 10px; font-size: 14px; }
        .bazi-table th { background: #101726; color: var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #04070c; padding: 10px; border-radius: 12px; border: 1px solid #1f2c42; margin-bottom: 16px; }
        .cell { background: #101726; aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; border: 1px solid var(--border); position: relative; padding: 4px; text-align: center; }
        .cell.ji { border: 1px solid var(--ji); color: var(--ji); background: rgba(0,230,118,0.05); }
        .cell.xiong { border: 1px solid var(--xiong); color: var(--xiong); background: rgba(255,51,51,0.05); }
        .cell-star { font-size: 11px; color: #fff; margin-top: 4px; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }
        .analysis-box { background: #0a111e; padding: 14px; border-radius: 8px; border-left: 4px solid var(--gold); margin-top: 12px; font-size: 13px; line-height: 1.6; color: #e1e7ed; }

</head>

        { keys: ["卯", "戌"], name: "卯戌六合", desc: "主化火之合，人緣極佳，容易得異性或同輩暗中鼎力支持、和諧共贏。" },
        { keys: ["辰", "酉"], name: "辰酉六合", desc: "主化金之合，能增強自身的財運、話語權與決策執行力，多得貴人提攜。" },
        { keys: ["巳", "申"], name: "巳申六合/刑", desc: "主先合後刑，合作或感情初期融洽，但後期容易因為利益分配產生口舌不和。" },
        { keys: ["午", "未"], name: "午未六合", desc: "主日趨和諧，磁場交融，凡事多能得天時地利之便，化險為夷。" },
        { keys: ["子", "丑"], name: "子丑六合", desc: "主沉穩相合，暗中得長輩、長官之提攜，基礎穩固，利於求名求財。" }

    // 5. 陽宅東西四命遊星配置
    const guaData = {
        "坎": { type: "東四命", cells: {"巽(東南)":"生氣(大吉)","離(正南)":"延年(中吉)","震(正東)":"天醫(次吉)","坎(正北)":"伏位(小吉)","坤(西南)":"絕命(大凶)","兌(正西)":"禍害(次凶)","艮(東北)":"五鬼(大凶)","乾(西北)":"六煞(次凶)","中宮":"中宮"} },
        "離": { type: "東四命", cells: {"震(正東)":"生氣(大吉)","坎(正北)":"延年(中吉)","巽(東南)":"天醫(次吉)","離(正南)":"伏位(小吉)","乾(西北)":"絕命(大凶)","艮(東北)":"禍害(次凶)","兌(正西)":"五鬼(大凶)","坤(西南)":"六煞(次凶)","中宮":"中宮"} },

        "乾": { type: "西四命", cells: {"兌(正西)":"生氣(大吉)","坤(西南)":"延年(中吉)","艮(東北)":"天醫(次吉)","乾(西北)":"伏位(小吉)","離(正南)":"絕命(大凶)","巽(東南)":"禍害(次凶)","震(正東)":"五鬼(大凶)","坎(正北)":"六煞(次凶)","中宮":"中宮"} },
        "坤": { type: "西四命", cells: {"艮(東北)":"生氣(大吉)","乾(西北)":"延年(中吉)","兌(正西)":"天醫(次吉)","坤(西南)":"伏位(小吉)","坎(正北)":"絕命(大凶)","震(正東)":"禍害(次凶)","巽(東南)":"五鬼(大凶)","離(正南)":"六煞(次凶)","中宮":"中宮"} },

    const layout = ["巽(東南)", "離(正南)", "坤(西南)", "震(正東)", "中宮", "兌(正西)", "艮(東北)", "坎(正北)", "乾(西北)"];

    // 計算本命卦核心邏輯
    function getMingGua(year, gender) {
        let sum = 0;
        let tmp = year;
        while(tmp > 0) { sum += tmp % 10; tmp = Math.floor(tmp / 10); }
        while(sum >= 10) { sum = Math.floor(sum / 10) + (sum % 10); }
        
        if(gender === "男") {
            let res = (11 - sum) % 9;
            if(res === 0) res = 9;
            if(res === 5) return "坤"; 
            const map = {1:"坎", 2:"坤", 3:"震", 4:"巽", 6:"乾", 7:"兌", 8:"艮", 9:"離"};
            return map[res];
        } else {
            let res = (sum + 4) % 9;
            if(res === 0) res = 9;
            if(res === 5) return "艮"; 
            const map = {1:"坎", 2:"坤", 3:"震", 4:"巽", 6:"乾", 7:"兌", 8:"艮", 9:"離"};
            return map[res];
        }
    }

    function processAll() {
        // A. 抓取八字數值並同步到表格
        const rz = document.getElementById('riZhu').value;
        const rzi = document.getElementById('riZhi').value;
        const nT = document.getElementById('nianTen').value;
        const yT = document.getElementById('yueTen').value;
        const sT = document.getElementById('shiTen').value;
        const nZ = document.getElementById('nianZhi').value;
        const yZ = document.getElementById('yueZhi').value;
        const sZ = document.getElementById('shiZhi').value;

        document.getElementById('tRiZhu').innerText = rz;
        document.getElementById('tRiZhi').innerText = rzi + '水'; // 表格日支
        document.getElementById('tNianTen').innerText = nT;
        document.getElementById('tYueTen').innerText = yT;
        document.getElementById('tShiTen').innerText = sT;
        document.getElementById('tNianZhi').innerText = nZ;
        document.getElementById('tYueZhi').innerText = yZ;
        document.getElementById('tShiZhi').innerText = sZ;

        // B. 八字文本詳解
        document.getElementById('riZhuAnalysis').innerHTML = riZhuText[rz] || "";
        
        let tenShenHtml = `<ul>
            <li>${tenShenText[nT]["年"]}</li>
            <li>${tenShenText[yT]["月"]}</li>
            <li>${tenShenText[sT]["時"]}</li>
        </ul>`;
        document.getElementById('tenShenAnalysis').innerHTML = tenShenHtml;

        // 地支衝合分析
        const activeZhi = [nZ, yZ, rzi, sZ];
        let zhiDesc = [];
        zhiRelations.forEach(r => {
            if(activeZhi.includes(r.keys[0]) && activeZhi.includes(r.keys[1])) {
                zhiDesc.push(`⚠️ 命盤內現【${r.name}】局：${r.desc}`);
            }
        });
        if(zhiDesc.length === 0) {
            zhiDesc.push("✅ 您的八字大局地支氣場平穩，無明顯的惡性劇烈刑衝。年支主少年根基、月支主青年事業、日支主中年家庭、時支主晚年歸宿，四氣流通良好。");
        }
        document.getElementById('zhiAnalysis').innerHTML = zhiDesc.join("<br>");

        // 婚姻宮分析
        document.getElementById('spouseAnalysis').innerHTML = `您的婚姻宮坐【${rzi}】，代表：${spouseText[rzi] || ""}`;

        // C. 東西四命九宮佈局
        const bYear = parseInt(document.getElementById('birthYear').value);
        const gen = document.getElementById('gender').value;
        const gua = getMingGua(bYear, gen);
        
        document.getElementById('mingGuaTxt').innerText = `您的本命卦為：【${gua}命】 (${guaData[gua].type})`;

        const currentGuaConfig = guaData[gua].cells;
        const gridBox = document.getElementById('homeGrid');
        gridBox.innerHTML = '';

        let jiCount = 0;
        let layoutDetails = [];

        layout.forEach(name => {
            const star = currentGuaConfig[name];
            const cell = document.createElement('div');
            
            let isJi = star.includes("吉") || star.includes("伏位");
            cell.className = `cell ${isJi ? 'ji' : star.includes("凶") ? 'xiong' : ''}`;
            cell.innerHTML = `<div>${name}</div>`;
            
            if(star !== "中宮") {
                const starSpan = document.createElement('span');
                starSpan.className = 'cell-star';
                starSpan.innerText = star;
                cell.appendChild(starSpan);
                
                // 收集文字註解
                layoutDetails.push(`<strong>${name} (${star})</strong>：${
                    star.includes("生氣") ? "此乃第一吉方，精力充沛、催財、催旺事業運，建議設置主臥室、大門或辦公桌。" :
                    star.includes("延年") ? "此乃和諧吉方，主管身體健康、長壽、夫妻感情與人際貴人，適合設置客廳或臥室。" :
                    star.includes("天醫") ? "此乃祛病吉方，代表財富與貴人身體健康，極度適合在此方位擺放神位或作餐廳。" :
                    star.includes("伏位") ? "此乃平穩吉方，代表平安、思緒沉穩、蓄勢待發，適合作為書房或靜坐空間。" :
                    star.includes("絕命") ? "此乃極凶方位，大耗精力、多病痛、破財。<strong>切勿在此安床或開大門</strong>，此處宜作廁所化煞。" :
                    star.includes("五鬼") ? "此乃大凶火方，易招惹口舌是非、小人、突發意外。此處忌諱喧鬧，應保持乾淨陰涼。" :
                    star.includes("禍害") ? "此乃次凶方位，容易因意志消沉、小人散布謠言而蒙受財產損失，此方不宜長期久坐。" :
                    "此乃次凶桃花之方，容易引發情緒起伏或人際誤會，不宜作為核心活動區。"
                }`);
            } else {
                cell.innerHTML += `<span class="cell-star">中宮</span>`;
            }
            gridBox.appendChild(cell);
        });

        document.getElementById('guaLayoutAnalysis').innerHTML = `<ul>${layoutDetails.map(d => `<li>${d}</li>`).join("")}</ul>`;
    }

    // 初始化執行一次
    processAll();
</script>
