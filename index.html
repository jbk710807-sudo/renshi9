<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壬水九號・食神空間盤</title>
    <style>
        :root { --bg: #030508; --card: #080d16; --gold: #ffd154; --text: #ffffff; --muted: #879fb9; --border: #141b29; --ji: #00e676; --xiong: #ff3333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 16px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 440px; }
        .header { text-align: center; padding: 15px 0; border-bottom: 1px solid var(--border); color: var(--gold); font-size: 18px; font-weight: bold; }
        .card { background: linear-gradient(135deg, #0e1726, #040810); border: 1px solid var(--gold); border-radius: 14px; padding: 16px; margin: 16px 0; font-size: 14px; line-height: 1.7; }
        .select-style { width: 100%; background: #101726 !important; border: 1px solid var(--gold) !important; color: #ffffff !important; padding: 12px; border-radius: 8px; font-weight: bold; margin: 8px 0 20px 0; font-size: 14px; display: block; }
        .select-style option { background-color: #101726 !important; color: #ffffff !important; }
        .grid-title { font-size: 13px; color: var(--gold); text-align: center; margin-bottom: 8px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #04070c; padding: 10px; border-radius: 12px; border: 1px solid #1f2c42; margin-bottom: 24px; min-height: 100px; }
        .cell { background: #101726; aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; border: 1px solid var(--border); position: relative; color: #fff; }
        .cell.ji { border: 1px solid var(--ji); color: var(--ji); background: rgba(0,230,118,0.05); }
        .cell.xiong { border: 1px solid var(--xiong); color: var(--xiong); background: rgba(255,51,51,0.05); }
        .tag { position: absolute; bottom: 4px; font-size: 10px; padding: 2px 4px; border-radius: 4px; color: #000; font-weight: bold; width: 90%; text-align: center; }
        .tag.seat { background: #00b0ff; color: #fff; }
        .tag.door { background: #ff9100; color: #fff; }
        .tips-box { background: #0a111e; padding: 14px; border-radius: 8px; border-left: 4px solid var(--gold); margin-top: 12px; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">👑 壬水九號・食神生財空間決策盤</div>
    <div class="card">
        <span style="color:var(--gold); font-size:16px; font-weight:bold;">🍀 甲午流月・食神生財運勢 (6/5 - 7/7)</span><br><br>
        <strong>【天時氣場解析】</strong><br>
        壬水日主見甲木為<strong>「食神」</strong>，見午火為<strong>「正財」</strong>。本月由「芒種」節氣管轄，是標準的食神生財氣場！才華橫溢、大腦靈感湧現，非常有利於規劃新項目與合作。<br><br>
        <strong>⚠️ 注意：</strong>地支午午自刑，內心容易糾結。本系統將透過空間磁場調校，把點子變現！
    </div>
    <label style="font-size:13px; color: var(--muted); font-weight:bold;">💼 職場佈局：選擇您的【辦公桌】坐向</label>
    <select id="selOffice" class="select-style" onchange="render()"></select>
    <div class="grid-title">💼 辦公室八宅吉凶空間（上南下北）</div>
    <div id="officeGrid" class="grid"></div>
    <label style="font-size:13px; color: var(--muted); font-weight:bold;">🛌 居家防禦：選擇您的【住宅大門】開向</label>
    <select id="selHome" class="select-style" onchange="render()"></select>
    <div class="grid-title">🛌 居家住宅八宅吉凶空間（上南下北）</div>
    <div id="homeGrid" class="grid"></div>
    <div class="card" style="border: 1px solid var(--border);">
        <span style="color:var(--gold); font-size:15px; font-weight:bold;">🎯 本月空間開運處方籤</span>
        <div class="tips-box"><strong>💻 辦公桌方位：</strong><span id="oTxt"></span></div>
        <div class="tips-box"><strong>🏡 住宅大門防禦：</strong><span id="hTxt"></span></div>
    </div>
</div>
<script>
    const bazhai = {"巽(東南)":"xiong", "離(正南)":"xiong", "坤(西南)":"ji", "震(正東)":"xiong", "中宮":"normal", "兌(正西)":"ji", "艮(東北)":"ji", "坎(正北)":"xiong", "乾(西北)":"ji"};
    const layout = ["巽(東南)", "離(正南)", "坤(西南)", "震(正東)", "中宮", "兌(正西)", "艮(東北)", "坎(正北)", "乾(西北)"];
    const options = [
        {text:"坐午向子 (坐南朝北) — 椅子靠南牆", val:"離(正南)", dVal:"坎(正北)"},
        {text:"坐子向午 (坐北朝南) — 椅子靠北牆", val:"坎(正北)", dVal:"離(正南)"},
        {text:"坐酉向卯 (坐西朝東) — 椅子靠西牆", val:"兌(正西)", dVal:"震(正東)"},
        {text:"坐卯向酉 (坐東朝西) — 椅子靠東牆", val:"震(正東)", dVal:"兌(正西)"},
        {text:"坐巽向乾 (坐東南朝西北)", val:"巽(東南)", dVal:"乾(西北)"},
        {text:"坐乾向巽 (坐西北朝東南)", val:"乾(西北)", dVal:"巽(東南)"},
        {text:"坐艮向坤 (坐東北朝西南)", val:"艮(東北)", dVal:"坤(西南)"},
        {text:"坐坤向艮 (坐西南朝東北)", val:"坤(西南)", dVal:"艮(東北)"}
    ];
    const oSel = document.getElementById('selOffice');
    const hSel = document.getElementById('selHome');
    options.forEach(o => {
        oSel.add(new Option(o.text, o.val));
        hSel.add(new Option(o.text, o.dVal));
    });
    function makeGrid(elementId, targetGong, tagClass, tagText) {
        const container = document.getElementById(elementId);
        if (!container) return;
        container.innerHTML = '';
        layout.forEach(name => {
            const state = bazhai[name];
            const cell = document.createElement('div');
            cell.className = `cell ${state}`;
            cell.innerText = name + (state==='ji'?' (吉)':state==='xiong'?' (凶)':'');
            if(name === targetGong) {
                const tag = document.createElement('div');
                tag.className = `tag ${tagClass}`;
                tag.innerText = tagText;
                cell.appendChild(tag);
            }
            container.appendChild(cell);
        });
    }
    function render() {
        const oTarget = oSel.value;
        const hTarget = hSel.value;
        makeGrid('officeGrid', oTarget, 'seat', '💺 您的座位');
        makeGrid('homeGrid', hTarget, 'door', '🚪 住宅大門');
        const oTxt = document.getElementById('oTxt');
        const hTxt = document.getElementById('hTxt');
        if(oTxt) {
            oTxt.innerText = bazhai[oTarget] === 'ji' 
                ? `您的辦公座位落在【${oTarget}吉方】。本月利於精準思考，右手邊放一杯水能
