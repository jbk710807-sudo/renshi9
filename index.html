<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壬水九號・專屬八戰空間決策盤</title>
    <style>
        :root {
            --bg-color: #030508;
            --card-bg: #080d16;
            --accent-gold: #ffd154;
            --text-main: #ffffff;
            --text-muted: #879fb9;
            --border-color: #141b29;
            --ji-green: #00e676;
            --xiong-red: #ff3333;
            --alert-orange: #ff9100;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 16px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 460px; }
        .header-section { text-align: center; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        .header-section h1 { font-size: 20px; color: var(--accent-gold); letter-spacing: 1px; margin-bottom: 6px; }
        .sub-badge { background: #152035; border: 1px solid var(--accent-gold); padding: 4px 12px; border-radius: 20px; font-size: 11px; color: var(--accent-gold); display: inline-block; margin-bottom: 12px; }
        
        .bazhai-card {
            background: linear-gradient(135deg, #0e1726, #040810);
            border: 1px solid var(--accent-gold);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .section-title { font-size: 14px; color: var(--accent-gold); margin-bottom: 10px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        
        .matrix-container { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
        .select-group { margin-bottom: 12px; }
        .select-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: bold; }
        .select-style { width: 100%; background: #101726; border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; }
        
        .grid-visual-title { font-size: 11px; color: var(--accent-gold); text-align: center; margin: 8px 0 4px 0; font-weight: bold; }
        .nine-gong-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; background: #04070c; padding: 8px; border-radius: 10px; border: 1px solid #1f2c42; margin-bottom: 12px; }
        .gong-cell { background: #101726; aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; position: relative; border: 1px solid var(--border-color); text-align: center; padding: 2px; }
        .gong-cell.ji { border: 1px solid var(--ji-green); color: var(--ji-green); background: rgba(0, 230, 118, 0.05); }
        .gong-cell.xiong { border: 1px solid var(--xiong-red); color: var(--xiong-red); background: rgba(255, 51, 51, 0.05); }
        .door-tag { position: absolute; bottom: 2px; background: var(--alert-orange); color: #000; font-size: 8px; padding: 1px 3px; border-radius: 4px; font-weight: 900; width: 85%; text-align: center; }
        .seat-tag { position: absolute; bottom: 2px; background: #00b0ff; color: #fff; font-size: 8px; padding: 1px 3px; border-radius: 4px; font-weight: 900; width: 85%; text-align: center; }

        .dynamic-info-card { background: linear-gradient(135deg, #0d1524, #04070c); border-radius: 16px; padding: 16px; border: 1px solid var(--border-color); }
        .space-directive-box { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .space-title-badge { display: inline-block; background: rgba(0, 230, 118, 0.1); color: #00e676; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; }
        .space-title-badge.office { background: rgba(255, 209, 84, 0.1); color: var(--accent-gold); }
        .directive-text { font-size: 13px; line-height: 1.6; color: #c9d6e4; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-section">
        <h1>壬水九號・專屬八戰空間決策盤</h1>
        <div class="sub-badge">👑 全方位八卦坐向・偏印流月精準版</div>
    </div>

    <div class="bazhai-card">
        <div class="section-title">🔮 命盤天時鑑定：歲次丙午年・癸巳流月運勢</div>
        <p style="font-size:13px; color:#c9d6e4; line-height:1.6;">
            目前時值新曆 6月5日至7月7日的<strong>【癸巳月】偏印月</strong>。比肩年遇到期待有所作為的【偏印月】，事業與理財皆想尋求改變與突破。偏印擁有梟雄般的聰慧與開創力，但本月切記宜低調沉穩，防範身邊的假貴人或人際暗傷。
        </p>
    </div>

    <div class="matrix-container">
        <div class="select-group">
            <label>💼 職場戰局：您的【辦公桌】坐向位置</label>
            <select id="selOffice" class="select-style" onchange="drawGrids()">
                <option value="S_N">坐午向子 (坐南朝北) — 椅靠南牆</option>
                <option value="N_S">坐子向午 (坐北朝南) — 椅靠北牆</option>
                <option value="W_E">坐酉向卯 (坐西朝東) — 椅靠西牆</option>
                <option value="E_W">坐卯向酉 (坐東朝西) — 椅靠東牆</option>
                <option value="SE_NW">坐巽向乾 (坐東南朝西北) — 椅靠東南</option>
                <option value="NW_SE">坐乾向巽 (坐西北朝東南) — 椅靠西北</option>
                <option value="NE_SW">坐艮向坤 (坐東北朝西南) — 椅靠東北</option>
                <option value="SW_NE">坐坤向艮 (坐西南朝東北) — 椅靠西南</option>
            </select>
        </div>
        <div class="grid-visual-title">💼 辦公室八宅吉凶分佈（上南下北）</div>
        <div id="officeGrid" class="nine-gong-grid"></div>

        <div class="select-group" style="margin-top: 16px;">
            <label>🛌 住宅防禦：您的【居家住宅】大門開向</label>
            <select id="selHome" class="select-style" onchange="drawGrids()">
                <option value="S_N">坐午向子 (大門朝正北方開)</option>
                <option value="N_S">坐子向午 (大門朝正南方開)</option>
                <option value="W_E">坐酉向卯 (大門朝正東方開)</option>
                <option value="E_W">坐卯向酉 (大門朝正西方開)</option>
                <option value="SE_NW">坐巽向乾 (大門朝西北方開)</option>
                <option value="NW_SE">坐乾向巽 (大門朝東南方開)</option>
                <option value="NE_SW">坐艮向坤 (大門朝西南方開)</option>
                <option value="SW_NE">坐坤向艮 (大門朝東北方開)</option>
            </select>
        </div>
        <div class="grid-visual-title">🛌 居家住宅八宅吉凶分佈（上南下北）</div>
        <div id="homeGrid" class="nine-gong-grid"></div>
    </div>

    <div class="dynamic-info-card">
        <div class="section-title">🎯 本月空間開運處方</div>
        
        <div class="space-directive-box">
            <div class="space-title-badge office">💼 辦公室空間決策</div>
            <div class="directive-text" id="officeTxt"></div>
        </div>

        <div class="space-directive-box">
            <div class="space-title-badge">🛌 居家避險決策</div>
            <div class="directive-text" id="homeTxt"></div>
        </div>
    </div>
</div>

<script>
    // 西四命（兌卦）專屬吉凶
    const bazhai = {
        "巽(東南)": "xiong", "離(正南)": "xiong", "坤(西南)": "ji",
        "震(正東)": "xiong", "中宮": "normal",    "兌(正西)": "ji",
        "艮(東北)": "ji",    "坎(正北)": "xiong", "乾(西北)": "ji"
    };
    
    // 固定上南下北的九宮格視覺順序
    const layoutOrder = ["巽(東南)", "離(正南)", "坤(西南)", "震(正東)", "中宮", "兌(正西)", "艮(東北)", "坎(正北)", "乾(西北)"];

    function getTargetGong(val, isOffice) {
        if (isOffice) {
            if (val === "S_N") return "離(正南)";
            if (val === "N_S") return "坎(正北)";
            if (val === "W_E") return "兌(正西)";
            if (val === "E_W") return "震(正東)";
            if (val === "SE_NW") return "巽(東南)";
            if (val === "NW_SE") return "乾(西北)";
            if (val === "NE_SW") return "艮(東北)";
            if (val === "SW_NE") return "坤(西南)";
        } else {
            // 大門朝向
            if (val === "S_N") return "坎(正北)";
            if (val === "N_S") return "離(正南)";
            if (val === "W_E") return "震(正東)";
            if (val === "E_W") return "兌(正西)";
            if (val === "SE_NW") return "乾(西北)";
            if (val === "NW_SE") return "巽(東南)";
            if (val === "NE_SW") return "坤(西南)";
            if (val === "SW_NE") return "艮(東北)";
        }
        return "";
    }

    function drawGrids() {
        const officeVal = document.getElementById('selOffice').value;
        const homeVal = document.getElementById('selHome').value;
        
        const officeTarget = getTargetGong(officeVal, true);
        const homeTarget = getTargetGong(homeVal, false);

        // 渲染辦公室
        const oGrid = document.getElementById('officeGrid');
        oGrid.innerHTML = '';
        layoutOrder.forEach(name => {
            const cell = document.createElement('div');
            const status = bazhai[name];
            cell.className = gong-cell ${status};
            cell.innerText = name + (status === 'ji' ? ' (吉)' : status === 'xiong' ? ' (凶)' : '');
            if (name === officeTarget) {
                cell.innerHTML += <div class="seat-tag">💺 您的座位</div>;
            }
            oGrid.appendChild(cell);
        });

        // 渲染居家
        const hGrid = document.getElementById('homeGrid');
        hGrid.innerHTML = '';
        layoutOrder.forEach(name => {
            const cell = document.createElement('div');
            const status = bazhai[name];
            cell.className = gong-cell ${status};
            cell.innerText = name + (status === 'ji' ? ' (吉)' : status === 'xiong' ? ' (凶)' : '');
            if (name === homeTarget) {
                cell.innerHTML += <div class="door-tag">🚪 住宅大門</div>;
            }
            hGrid.appendChild(cell);
        });

        // 動態文字建議
        const oStatus = bazhai[officeTarget];
        if (oStatus === 'ji') {
            document.getElementById('officeTxt').innerText = 您的座位正位於【${officeTarget}吉方】。本月偏印當令，完美坐落吉星護持之位。職場上利於思考、佈局與暗中策劃。建議保持桌面整潔，可在案頭擺放名片夾，有助於偏印轉化為源源不絕的權威財富氣場。;
        } else {
            document.getElementById('officeTxt').innerText = 您的座位目前處於【${officeTarget}凶方】。本月偏印月宜低調防暗傷，避免與人產生口舌爭執。建議多加利用您桌面的【西南方(坤)】、【西北方(乾)】或【東北方(艮)】等吉利方位放置重要業務文件，藉此撥轉磁場、化煞為財。;
        }

        const hStatus = bazhai[homeTarget];
        if (hStatus === 'ji') {
            document.getElementById('homeTxt').innerText = 住宅大門開在【${homeTarget}吉方】。偏印流月進出吉星玄關，能帶來奇門巧思的開創運勢。大門口宜保持動線流暢，可放置金色或暖色系擺飾，讓旺氣開門即入，家運平穩順遂。;
        } else {
            document.getElementById('homeTxt').innerText = 住宅大門開在【${homeTarget}凶方】。偏印流月出入此方，玄關處切記不可堆放雜物與鞋盒。建議進出大門時保持沉穩語氣、多帶笑容，並可在門口玄關處使用深色或綠色系地墊來轉換磁場，守護全家出入平安。;
        }
    }

    window.onload = drawGrids;
</script>
</body>
</html>
