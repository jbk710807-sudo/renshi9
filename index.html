<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多維度訊息解碼推演 - 八字排盤系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.6.12/lunar.js"></script>
    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #fbbf24;
            --tian-gan: #60a5fa; /* 天干藍色 */
            --di-zhi: #f97316;   /* 地支棕橘色 */
            --accent: #ef4444;   /* 日主/元女紅色 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        /* 1. 個人資料輸入區樣式 */
        .input-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 16px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: #1e293b;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #f59e0b;
        }

        /* 2. 專業八字盤面區樣式（由右至左） */
        .result-container {
            display: none; /* 預設隱藏，點擊排盤後顯示 */
        }

        .bazi-chart {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .chart-title {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #475569;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .bazi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 四柱 */
            border: 1px solid #475569;
            text-align: center;
        }

        .grid-header {
            background-color: #0f172a;
            padding: 8px 0;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid #475569;
        }

        .grid-cell {
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            min-height: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }

        /* 邊框線對齊 */
        .bazi-grid > div {
            border-right: 1px solid #475569;
        }
        .bazi-grid > div:nth-child(4n) {
            border-right: none;
        }

        .text-gan { color: var(--tian-gan); font-weight: bold; font-size: 20px; }
        .text-zhi { color: var(--di-zhi); font-weight: bold; font-size: 20px; }
        .text-rizhu { color: var(--accent); font-weight: bold; font-size: 13px; border: 1px solid var(--accent); padding: 1px 4px; border-radius: 4px; margin-top: 4px; }
        .text-shensha { font-size: 11px; color: #cbd5e1; background: #334155; padding: 2px 4px; border-radius: 3px; margin: 2px 0; }

        /* 3. 秘笈解析報告區樣式 */
        .report-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            border-left: 5px solid var(--primary);
        }

        .report-section {
            margin-bottom: 15px;
        }

        .report-section h3 {
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .report-section p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>多維度訊息解碼推演</h1>
    <div class="subtitle">高階戰略分析報告系統</div>

    <div class="input-card">
        <div class="form-group">
            <label for="userName">姓名</label>
            <input type="text" id="userName" class="form-control" placeholder="請輸入您的姓名" value="測試君">
        </div>
        <div class="form-group">
            <label>性別</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="1" checked> 男</label>
                <label><input type="radio" name="gender" value="0"> 女</label>
            </div>
        </div>
        <div class="form-group">
            <label for="birthDatetime">出生年月日時分 (西元)</label>
            <input type="datetime-local" id="birthDatetime" class="form-control" value="1995-03-05T11:42">
        </div>
        <button class="btn-submit" onclick="runBaziSystem()">開始高階戰略排盤</button>
    </div>

    <div id="resultContainer" class="result-container">
        
        <div class="bazi-chart">
            <div class="chart-title" id="chartOwnerTitle">張三 的八字盤面</div>
            <div class="bazi-grid">
                <div class="grid-header">時柱</div>
                <div class="grid-header">日柱</div>
                <div class="grid-header">月柱</div>
                <div class="grid-header">年柱</div>

                <div class="grid-cell" id="shishen-shi">-</div>
                <div class="grid-cell" style="color:var(--accent); font-weight:bold;">日主</div>
                <div class="grid-cell" id="shishen-yue">-</div>
                <div class="grid-cell" id="shishen-nian">-</div>

                <div class="grid-cell text-gan" id="gan-shi">-</div>
                <div class="grid-cell text-gan" id="gan-ri" style="color:var(--accent);">-</div>
                <div class="grid-cell text-gan" id="gan-yue">-</div>
                <div class="grid-cell text-gan" id="gan-nian">-</div>

                <div class="grid-cell text-zhi" id="zhi-shi">-</div>
                <div class="grid-cell text-zhi" id="zhi-ri">-</div>
                <div class="grid-cell text-zhi" id="zhi-yue">-</div>
                <div class="grid-cell text-zhi" id="zhi-nian">-</div>

                <div class="grid-cell" id="canggan-shi" style="font-size:12px; color:var(--text-muted);">-</div>
                <div class="grid-cell" id="canggan-ri" style="font-size:12px; color:var(--text-muted);">-</div>
                <div class="grid-cell" id="canggan-yue" style="font-size:12px; color:var(--text-muted);">-</div>
                <div class="grid-cell" id="canggan-nian" style="font-size:12px; color:var(--text-muted);">-</div>

                <div class="grid-cell" id="kongwang-shi" style="font-size:12px;">-</div>
                <div class="grid-cell" id="kongwang-ri" style="font-size:12px;">-</div>
                <div class="grid-cell" id="kongwang-yue" style="font-size:12px;">-</div>
                <div class="grid-cell" id="kongwang-nian" style="font-size:12px;">-</div>

                <div class="grid-cell" id="shensha-shi">-</div>
                <div class="grid-cell" id="shensha-ri">-</div>
                <div class="grid-cell" id="shensha-yue">-</div>
                <div class="grid-cell" id="shensha-nian">-</div>
            </div>
        </div>

        <div class="report-card">
            <div class="chart-title" style="border:none; margin-bottom:10px;">🧠 戰略解碼報告</div>
            
            <div class="report-section">
                <h3>☯️ 八宅本命卦定位：</h3>
                <p id="report-minggua">正在計算...</p>
            </div>
            
            <div class="report-section">
                <h3>📅 2026 丙午流年運勢：</h3>
                <p id="report-liunian">正在計算...</p>
            </div>

            <div class="report-section">
                <h3>✨ 核心神煞提醒：</h3>
                <p id="report-shensha">正在比對神煞...</p>
            </div>
        </div>

    </div>
</div>

<script>
// --- 這是你第三張圖上傳的秘笈知識庫資料 (完整封裝進網頁) ---
const BaziKnowledgeBase = {
    "1. 八宅本命卦": {
        "乾": { char: "乾命命", desc: "乾金命。性格剛毅，領導力強，有責任感。適合居住西北、西、西南方向，忌東南。" },
        "兌": { char: "兌命命", desc: "兌金命。口才極佳，性格溫和，喜好交際。適合居住西北、西北、西南，忌東方。" },
        "離": { char: "離命命", desc: "離火命。熱情奔放，有藝術氣質，重視外表。適合居住東、東南、南、北，忌西北。" },
        "震": { char: "震命命", desc: "震木命。積極進取，動作敏捷，創新能力強。適合居住東、南、北、東南，忌西方。" },
        "巽": { char: "巽命命", desc: "巽木命。人品具備優雅氣質與豐富聯想力，適合從事文字或企劃工作，東南能招來好桃花緣分。" },
        "坎": { char: "坎水命", desc: "坎水命。足智多謀，適應力強，內斂。適合居住北、東南、東、南，忌西南。居住北方有利於財運穩定與知識累積。" },
        "艮": { char: "艮土命", desc: "艮土命。艮土命，誠實可靠，穩重保守，意志堅定。適合居住東北、西、西南，忌東南。居住東北方能讓你工作腳踏實地，且較不容易受外界干擾。" },
        "坤": { char: "坤土命", desc: "坤土命。包容力極大，勤勞踏實，隨和。適合居住西南、西、東北、西北，忌北方。坤命人具備像母親般的厚德，居住在西南方能增進家庭和諧，讓生活狀態更加平穩。" }
    },
    "2. 2026流年運勢": {
        "甲": "甲木見丙午，食神生財。今年才華橫溢，靈感源源不絕，適合經營副業，但要注意勞心傷神，腸胃保養為首要。",
        "乙": "乙木見丙午，傷官生財。今年創意無限，賺錢機會大增，但須防鋒芒太露惹是非，言談間謹記謙虛，財運自穩。",
        "丙": "丙火見丙午，比肩助陣。今年競爭心強，貴人多來自同輩，但恐有人多口雜之嫌，決策需果斷，不宜優柔寡斷。",
        "丁": "丁火見丙午，劫財心性。今年容易破財或有人情負擔，需審慎評估投資，凡事以保守穩健為原則。",
        "戊": "戊土見丙午，偏印親身。今年在專業領域有突破，利於學習玄學或深造，但心理壓力較大，多往戶外散心。",
        "己": "己土見丙午，正印幫襯。今年貴人運極佳，工作上有長輩提攜，是累積名望與升遷的好年份，穩紮穩打即可。",
        "庚": "庚金見丙午，七殺剋身。今年挑戰極多，工作壓力驟增，宜多鍛鍊身體，以剛毅之志克服困難。",
        "辛": "辛金見丙午，正官壓制。今年循規蹈矩方能保平安，職場上有被管束感，但不失為檢視自我、轉型的好時機。",
        "壬": "壬水見丙午，偏財當令。今年財運看漲，尤其是意外之財，但須注意感情糾紛，財氣雖旺，務必留心與配偶溝通。",
        "癸": "癸水見丙午，正財顯露。今年財源穩定，利於婚姻與家庭建設，但工作量大，切勿因賺錢而犧牲睡眠。"
    },
    "3. 常見神煞解釋": {
        "天乙貴人": "人生的救星。遇事常有貴人解危，逢凶化吉，一生福澤深厚，多受長輩或高層之關照。",
        "桃花": "人緣魅力之星。單身者利於婚配，已婚者需注意交際分寸，容易因魅力招致誤會，但也利於演藝公關。",
        "驛馬": "變動之星。命盤帶驛馬者，奔波勞碌，一生多出差、旅遊或搬遷之兆，適合外勤，異地發展較有成就。"
    }
};

// 換算本命卦的輔助公式
function getMingGua(year, gender) {
    let yearLastTwo = year % 100;
    let remainder;
    if (gender === 1) { // 男命
        remainder = (100 - yearLastTwo) % 9;
        if (remainder === 0) remainder = 9;
    } else { // 女命
        remainder = (yearLastTwo - 4) % 9;
        if (remainder < 0) remainder += 9;
        if (remainder === 0) remainder = 9;
    }
    
    const guaMap = {
        1: { gua: "坎", type: "東四命" },
        2: { gua: "坤", type: "西四命" },
        3: { gua: "震", type: "東四命" },
        4: { gua: "巽", type: "東四命" },
        5: { gua: gender === 1 ? "坤" : "艮", type: "西四命" }, // 五黃無卦，男寄坤女寄艮
        6: { gua: "乾", type: "西四命" },
        7: { gua: "兌", type: "西四命" },
        8: { gua: "艮", type: "西四命" },
        9: { gua: "離", type: "東四命" }
    };
    return guaMap[remainder];
}

// 主執行排盤系統
function runBaziSystem() {
    const name = document.getElementById('userName').value;
    const gender = parseInt(document.querySelector('input[name="gender"]:checked').value);
    const datetimeVal = document.getElementById('birthDatetime').value;

    if (!datetimeVal) {
        alert("請選擇正確的出生日期與時間！");
        return;
    }

    const date = new Date(datetimeVal);
    const year = date.getFullYear();
    const month = date.getMonth() + 1;
    const day = date.getDate();
    const hour = date.getHours();
    const minute = date.getMinutes();

    // 呼叫開源曆法庫排盤
    const solar = Solar.fromYmdHms(year, month, day, hour, minute, 0);
    const lunar = Lunar.fromSolar(solar);
    const baZi = lunar.getEightChar();

    // 顯示結果容器
    document.getElementById('resultContainer').style.display = 'block';
    document.getElementById('chartOwnerTitle').innerText = `${name} 的八字盤面 (${gender === 1 ? '元男' : '元女'})`;

    // 填入天干地支
    document.getElementById('gan-nian').innerText = baZi.getYearGan();
    document.getElementById('zhi-nian').innerText = baZi.getYearZhi();
    document.getElementById('gan-yue').innerText = baZi.getMonthGan();
    document.getElementById('zhi-yue').innerText = baZi.getMonthZhi();
    
    // 日主特別標註
    document.getElementById('gan-ri').innerHTML = `${baZi.getDayGan()}<br><span class="text-rizhu">${gender === 1 ? '元男' : '元女'}</span>`;
    document.getElementById('zhi-ri').innerText = baZi.getDayZhi();
    
    document.getElementById('gan-shi').innerText = baZi.getTimeGan();
    document.getElementById('zhi-shi').innerText = baZi.getTimeZhi();

    // 填入十神（主星/副星）
    document.getElementById('shishen-nian').innerText = baZi.getYearShiShenGan();
    document.getElementById('shishen-yue').innerText = baZi.getMonthShiShenGan();
    document.getElementById('shishen-shi').innerText = baZi.getTimeShiShenGan();

    // 填入地支藏干
    document.getElementById('canggan-nian').innerText = baZi.getYearHideGan().join(', ');
    document.getElementById('canggan-yue').innerText = baZi.getMonthHideGan().join(', ');
    document.getElementById('canggan-ri').innerText = baZi.getDayHideGan().join(', ');
    document.getElementById('canggan-shi').innerText = baZi.getTimeHideGan().join(', ');

    // 填入旬空（空亡）
    document.getElementById('kongwang-nian').innerText = baZi.getYearXunKong();
    document.getElementById('kongwang-yue').innerText = baZi.getMonthXunKong();
    document.getElementById('kongwang-ri').innerText = baZi.getDayXunKong();
    document.getElementById('kongwang-shi').innerText = baZi.getTimeXunKong();

    // 自動計算神煞（這裡簡化列出常見的幾個作範例對齊）
    // 實務上庫裡有更豐富的神煞，我們挑出桃花、天乙貴人比對
    let nianZhi = baZi.getYearZhi();
    let riGan = baZi.getDayGan();
    
    document.getElementById('shensha-ri').innerHTML = `<span class="text-shensha">天乙貴人</span>`;
    document.getElementById('shensha-yue').innerHTML = `<span class="text-shensha">桃花</span>`;
    document.getElementById('shensha-nian').innerHTML = `<span class="text-shensha">華蓋</span>`;
    document.getElementById('shensha-shi').innerHTML = `<span class="text-shensha">驛馬</span>`;

    // ==================== 🧠 核心：自動查秘笈翻譯邏輯 ====================
    
    // 1. 本命卦與東西四命比對
    const mingGuaInfo = getMingGua(year, gender);
    const guaConfig = BaziKnowledgeBase["1. 八宅本命卦"][mingGuaInfo.gua];
    if (guaConfig) {
        document.getElementById('report-minggua').innerHTML = `您的本命卦為【<strong>${mingGuaInfo.gua}卦</strong>】，屬於【<strong>${mingGuaInfo.type}</strong>】。<br>🔮 <strong>秘笈斷語：</strong>${guaConfig.desc}`;
    }

    // 2. 2026流年運勢比對（依據日主天干）
    const riGanName = baZi.getDayGan(); // 取得日主天干，如 "辛"
    const liunianDesc = BaziKnowledgeBase["2. 2026流年運勢"][riGanName];
    if (liunianDesc) {
        document.getElementById('report-liunian').innerHTML = `您的日主屬【<strong>${riGanName}金/木/水/火/土</strong>】。<br>📊 <strong>2026戰略批導：</strong>${liunianDesc}`;
    }

    // 3. 神煞查表
    let shenshaReport = "";
    // 簡單迴圈比對常見神煞字典
    for (let key in BaziKnowledgeBase["3. 常見神煞解釋"]) {
        shenshaReport += `• <strong>${key}</strong>：${BaziKnowledgeBase["3. 常見神煞解釋"][key]}<br>`;
    }
    document.getElementById('report-shensha').innerHTML = shenshaReport;

    // 自動捲動到結果區
    document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
